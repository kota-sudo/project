<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>無料見学予約 | 男磨きハウス</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/entry.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <header class="entry-header">
        <a href="index.html" class="entry-logo">男磨きハウス</a>
        <a href="index.html" class="entry-back">← TOPへ戻る</a>
    </header>

    <section class="entry-section">
        <div class="entry-container">
            <h1 class="entry-title">無料見学予約</h1>

            <p class="entry-desc">
                施設の雰囲気や設備を、ぜひ実際に体験してください。<br>
                スタッフがご案内いたします。
            </p>

            <form class="entry-form" id="entryForm">
                <div class="form-group">
                    <label for="entryName">お名前</label>
                    <input id="entryName" type="text" placeholder="山田 太郎" required>
                </div>

                <div class="form-group">
                    <label for="entryEmail">メールアドレス</label>
                    <input id="entryEmail" type="email" placeholder="example@gmail.com" required>
                </div>

                <div class="form-group">
                    <label for="entryTel">電話番号</label>
                    <input id="entryTel" type="tel" placeholder="09012345678">
                </div>

                <div class="form-group">
                    <label>見学希望日時</label>

                    <div class="booking-picker">
                        <div class="booking-header">
                            <button type="button" class="booking-today-btn" id="bookingTodayBtn">
                                今週
                            </button>

                            <div class="booking-nav">
                                <button type="button" class="booking-nav-btn" id="prevWeekBtn" aria-label="前の週">
                                    ‹
                                </button>
                                <button type="button" class="booking-nav-btn" id="nextWeekBtn" aria-label="次の週">
                                    ›
                                </button>
                            </div>

                            <p class="booking-month" id="bookingMonthLabel">2026年03月</p>
                        </div>

                        <p class="booking-legend">
                            <span class="legend-ok">○ 予約可能</span>
                            <span class="legend-ng">× 予約不可</span>
                        </p>

                        <div class="booking-board-wrap">
                            <div class="booking-board" id="bookingBoard"></div>
                        </div>

                        <p class="booking-selected" id="bookingSelectedText">
                            希望日時を選択してください
                        </p>

                        <input type="hidden" name="visit_slot" id="visitSlotInput" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="entryMessage">お問い合わせ内容</label>
                    <textarea id="entryMessage" rows="4" placeholder="ご質問などがあればご記入ください"></textarea>
                </div>

                <button type="submit" class="entry-btn">予約する</button>
            </form>
        </div>
    </section>

    <footer class="entry-footer">
        <p>© 男磨きハウス</p>
    </footer>

    <script src="js/entry.js"></script>
</body>

</html>
