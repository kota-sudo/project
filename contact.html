<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>お問い合わせ | 男磨きハウス</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/contact.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <header class="contact-header">
        <div class="contact-header-inner">
            <h1 class="contact-logo"><a href="index.html">男磨きハウス</a></h1>
            <a href="index.html" class="top-btn">TOPへ</a>
        </div>
    </header>

    <main class="contact-page">
        <section class="contact-hero">
            <p class="contact-label">CONTACT</p>
            <h2 class="contact-title">お問い合わせ</h2>
            <p class="contact-text">
                ご不明点や見学前のご相談など、お気軽にお問い合わせください。
            </p>
        </section>

        <section class="contact-form-section">
            <div class="contact-form-card">
                <form action="#" method="post" class="contact-form">
                    <div class="form-group">
                        <label for="name">お名前</label>
                        <input type="text" id="name" name="name" placeholder="例：山田 太郎">
                    </div>

                    <div class="form-group">
                        <label for="email">メールアドレス</label>
                        <input type="email" id="email" name="email" placeholder="example@mail.com">
                    </div>

                    <div class="form-group">
                        <label for="type">お問い合わせ種別</label>
                        <select id="type" name="type">
                            <option value="">選択してください</option>
                            <option value="tour">見学について</option>
                            <option value="plan">料金・プランについて</option>
                            <option value="facility">施設について</option>
                            <option value="other">その他</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">お問い合わせ内容</label>
                        <textarea id="message" name="message" rows="7" placeholder="お問い合わせ内容をご入力ください"></textarea>
                    </div>

                    <button type="submit" class="contact-submit-btn">送信する</button>
                </form>
            </div>
        </section>
    </main>
</body>

</html>
